<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reward App</title>

    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Monetag SDK -->
    <script src='//libtl.com/sdk.js'
        data-zone='10111387'
        data-sdk='show_10111387'>
    </script>

    <style>
        body {
            margin: 0;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }

        .loading {
            color: #38bdf8;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🎁  Ads are about to load..</h2>
    <p class="loading">Please wait...</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Get webhook from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const webhookUrl = urlParams.get("webhook");

    function showAd() {

        if (typeof show_10111387 !== "function") {
            tg.close();
            return;
        }

        show_10111387().then(() => {

            // Ad successfully completed
            if (webhookUrl && tg.initDataUnsafe && tg.initDataUnsafe.user) {

                fetch(webhookUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: tg.initDataUnsafe.user.id,
                        status: "completed"
                    })
                })
                .then(() => {
                    tg.close();
                })
                .catch(() => {
                    tg.close();
                });

            } else {
                tg.close();
            }

        }).catch(() => {
            // If ad not completed or error
            tg.close();
        });
    }

    // Automatically show ad when app opens
    window.onload = function () {
        setTimeout(showAd, 800);
    };
</script>

</body>
</html>
